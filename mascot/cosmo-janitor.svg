<svg viewBox="0 0 220 170" width="440" height="340" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Cosmo the janitor tardigrade — warm lavender, gold broom + sparkle -->
  <rect width="220" height="170" fill="#131127"/>
  <!-- stars -->
  <rect x="186" y="30" width="4" height="4" fill="#ffffff" opacity=".6"/>
  <rect x="200" y="96" width="3" height="3" fill="#ffffff" opacity=".5"/>
  <!-- gold "swept clean" sparkle (upper right) -->
  <rect x="150" y="28" width="6" height="22" fill="#ffd166"/>
  <rect x="142" y="36" width="22" height="6" fill="#ffd166"/>
  <rect x="178" y="58" width="5" height="5" fill="#ffd166"/>
  <!-- broom (left of the creature, held by front leg) -->
  <rect x="26" y="58" width="6" height="80" fill="#ffd166"/>           <!-- handle -->
  <rect x="12" y="138" width="30" height="8" fill="#ffd166"/>          <!-- brush head (solid) -->
  <rect x="12" y="146" width="30" height="5" fill="#e0b84d"/>          <!-- bristle base -->
  <rect x="40" y="138" width="22" height="4" fill="#a386c2"/>          <!-- arm: front leg to handle -->
  <!-- body (warm) -->
  <rect x="56" y="36" width="96" height="12" fill="#c5a8dd"/>
  <rect x="44" y="48" width="120" height="60" fill="#c5a8dd"/>
  <rect x="56" y="108" width="108" height="12" fill="#a386c2"/>
  <rect x="164" y="60" width="12" height="40" fill="#c5a8dd"/>
  <rect x="92" y="48" width="4" height="60" fill="#a386c2"/>
  <rect x="124" y="48" width="4" height="60" fill="#a386c2"/>
  <rect x="44" y="44" width="52" height="4" fill="#dff3ff" opacity=".8"/>
  <rect x="40" y="48" width="4" height="44" fill="#dff3ff" opacity=".8"/>
  <rect x="44" y="92" width="52" height="4" fill="#dff3ff" opacity=".8"/>
  <rect x="96" y="48" width="4" height="44" fill="#dff3ff" opacity=".8"/>
  <rect x="56" y="60" width="14" height="14" fill="#241d3d"/>
  <rect x="60" y="63" width="5" height="5" fill="#ffffff"/>
  <rect x="48" y="82" width="10" height="6" fill="#e8a8c8"/>
  <rect x="58" y="86" width="14" height="4" fill="#241d3d"/>
  <rect x="58" y="120" width="14" height="18" fill="#a386c2"/>
  <rect x="88" y="120" width="14" height="18" fill="#a386c2"/>
  <rect x="118" y="120" width="14" height="18" fill="#a386c2"/>
  <rect x="148" y="120" width="14" height="18" fill="#a386c2"/>
</svg>
