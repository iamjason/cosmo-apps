<svg viewBox="0 0 220 170" width="440" height="340" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Agentic the captain tardigrade — cool lavender, mint headset + floating prompt -->
  <rect width="220" height="170" fill="#131127"/>
  <!-- stars -->
  <rect x="30" y="24" width="4" height="4" fill="#ffffff" opacity=".6"/>
  <rect x="208" y="120" width="3" height="3" fill="#ffffff" opacity=".5"/>
  <!-- floating terminal the captain directs (upper right) -->
  <rect x="140" y="26" width="64" height="50" rx="6" ry="6" fill="#1b1830" stroke="#dff3ff" stroke-opacity=".5" stroke-width="3"/>
  <rect x="150" y="40" width="8" height="8" fill="#7de8c3"/>           <!-- ">" -->
  <rect x="158" y="48" width="8" height="8" fill="#7de8c3"/>
  <rect x="150" y="56" width="8" height="8" fill="#7de8c3"/>
  <rect x="170" y="58" width="20" height="6" fill="#7de8c3"/>          <!-- "_" -->
  <!-- body (cool) -->
  <rect x="56" y="36" width="96" height="12" fill="#a6aee8"/>
  <rect x="44" y="48" width="120" height="60" fill="#a6aee8"/>
  <rect x="56" y="108" width="108" height="12" fill="#8290cc"/>
  <rect x="164" y="60" width="12" height="40" fill="#a6aee8"/>
  <rect x="92" y="48" width="4" height="60" fill="#8290cc"/>
  <rect x="124" y="48" width="4" height="60" fill="#8290cc"/>
  <rect x="44" y="44" width="52" height="4" fill="#dff3ff" opacity=".8"/>
  <rect x="40" y="48" width="4" height="44" fill="#dff3ff" opacity=".8"/>
  <rect x="44" y="92" width="52" height="4" fill="#dff3ff" opacity=".8"/>
  <rect x="96" y="48" width="4" height="44" fill="#dff3ff" opacity=".8"/>
  <rect x="56" y="60" width="14" height="14" fill="#241d3d"/>
  <rect x="60" y="63" width="5" height="5" fill="#ffffff"/>
  <rect x="48" y="82" width="10" height="6" fill="#e8a8c8"/>
  <rect x="58" y="86" width="14" height="4" fill="#241d3d"/>
  <rect x="58" y="120" width="14" height="18" fill="#8290cc"/>
  <rect x="88" y="120" width="14" height="18" fill="#8290cc"/>
  <rect x="118" y="120" width="14" height="18" fill="#8290cc"/>
  <rect x="148" y="120" width="14" height="18" fill="#8290cc"/>
  <!-- headset (mint) drawn over helmet + body -->
  <rect x="42" y="36" width="56" height="6" fill="#7de8c3"/>           <!-- band over helmet top -->
  <rect x="34" y="42" width="8" height="22" fill="#7de8c3"/>           <!-- left earpiece -->
  <rect x="34" y="64" width="6" height="16" fill="#7de8c3"/>           <!-- mic boom down -->
  <rect x="40" y="86" width="16" height="5" fill="#7de8c3"/>           <!-- mic boom to mouth -->
  <rect x="52" y="84" width="6" height="8" fill="#7de8c3"/>            <!-- mic tip -->
</svg>
